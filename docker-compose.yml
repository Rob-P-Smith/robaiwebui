services:
  open-webui:
    image: ${WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    container_name: open-webui
    volumes:
      - open-webui_open-webui:/app/backend/data
    ports:
      - "${WEBUI_EXTERNAL_PORT:-80}:${WEBUI_INTERNAL_PORT:-8080}"
    environment:
      # OpenAI API Configuration (points to robaiproxy)
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-http://192.168.10.50:8079/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-dummy-key}
    restart: ${WEBUI_RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${WEBUI_INTERNAL_PORT:-8080}/ || exit 1"]
      interval: ${WEBUI_HEALTH_INTERVAL:-30s}
      timeout: ${WEBUI_HEALTH_TIMEOUT:-10s}
      retries: ${WEBUI_HEALTH_RETRIES:-3}
      start_period: ${WEBUI_HEALTH_START_PERIOD:-30s}

volumes:
  open-webui_open-webui:
    external: true
